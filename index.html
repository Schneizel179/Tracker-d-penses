<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Tracker Dépenses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Mon Tracker de Dépenses</h1>
        
        <div class="dashboard">
            <div class="card">
                <h2>Total ce mois</h2>
                <p id="total-mois" class="amount">0,00 €</p>
            </div>
        </div>

        <!-- Formulaire -->
        <form id="form-depense">
            <input type="number" id="montant" placeholder="Montant (€)" step="0.01" required>
            <select id="categorie" required>
                <option value="">Catégorie</option>
                <option value="Nourriture">🍔 Nourriture</option>
                <option value="Transport">🚌 Transport</option>
                <option value="Loyer">🏠 Loyer</option>
                <option value="Loisirs">🎮 Loisirs</option>
                <option value="Courses">🛒 Courses</option>
                <option value="Autre">Autre</option>
            </select>
            <input type="date" id="date" required>
            <input type="text" id="note" placeholder="Note (optionnel)">
            <button type="submit">Ajouter la dépense</button>
        </form>

        <!-- Résumé par catégorie -->
        <h3>Répartition</h3>
        <div id="repartition"></div>

        <!-- Liste des dépenses -->
        <h3>Historique</h3>
        <div id="liste-depenses"></div>

        <button onclick="exporterCSV()" class="export-btn">📥 Exporter en CSV</button>
        <button onclick="effacerTout()" class="delete-btn">🗑️ Tout effacer</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
